name: Daily Panchangam Pipeline

on:
  schedule:
    # 01:00 UTC = 8 PM EST / 9 PM EDT — scrapes TOMORROW's data each evening
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      use_tomorrow:
        description: 'Generate for tomorrow instead of today (true/false)'
        required: false
        default: 'true'
      render_approved:
        description: 'Phase 2a: render videos after you reviewed the data (true/false)'
        required: false
        default: 'false'
      upload_approved:
        description: 'Phase 2b: upload rendered videos after you reviewed thumbnails (true/false)'
        required: false
        default: 'false'
      skip_approval:
        description: 'Legacy: scrape + render + upload in one shot (true/false)'
        required: false
        default: 'false'
      regenerate_city:
        description: 'Re-scrape a single city key (leave blank for all cities)'
        required: false
        default: ''
      panchang_overrides:
        description: 'JSON overrides keyed by city_key'
        required: false
        default: '{}'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 1: Scrape data + generate scripts → deploy to dashboard (pending)
  # ─────────────────────────────────────────────────────────────────────────────
  scrape-data:
    name: Scrape Panchangam Data
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.render_approved != 'true' &&
      github.event.inputs.upload_approved != 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-chromedriver

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml pytz anthropic pillow gtts \
                      selenium webdriver-manager

      - name: Scrape panchangam data
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          APPROVAL_EMAIL_FROM: ${{ secrets.APPROVAL_EMAIL_FROM }}
          APPROVAL_EMAIL_TO:   ${{ secrets.APPROVAL_EMAIL_TO }}
          SMTP_HOST:           smtp.gmail.com
          SMTP_PORT:           587
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          REGEN_CITY:          ${{ github.event.inputs.regenerate_city }}
          OVERRIDES:           ${{ github.event.inputs.panchang_overrides }}
          SKIP_APPROVAL:       ${{ github.event.inputs.skip_approval }}
          USE_TOMORROW:        ${{ github.event.inputs.use_tomorrow }}
          EVENT_NAME:          ${{ github.event_name }}
        run: |
          mkdir -p output
          cd scripts

          if [ "$EVENT_NAME" = "schedule" ] || [ "$USE_TOMORROW" = "true" ]; then
            TOMORROW_FLAG="--tomorrow"
          else
            TOMORROW_FLAG=""
          fi

          if [ "$SKIP_APPROVAL" = "true" ]; then
            python pipeline.py --skip-approval $TOMORROW_FLAG
          elif [ -n "$REGEN_CITY" ]; then
            python pipeline.py --data-only $TOMORROW_FLAG \
              --city "$REGEN_CITY" \
              --overrides "$OVERRIDES"
          else
            python pipeline.py --data-only $TOMORROW_FLAG
          fi

      - name: Copy state to dashboard
        run: |
          cp output/pipeline_state.json dashboard/pipeline_state.json
          echo '{
            "owner": "${{ github.repository_owner }}",
            "repo":  "${{ github.event.repository.name }}",
            "run_id": "${{ github.run_id }}",
            "workflow_file": "daily-pipeline.yml"
          }' > dashboard/repo_config.json

      - name: Commit state to repo
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/pipeline_state.json dashboard/repo_config.json
          git diff --cached --quiet || git commit -m "chore: update dashboard state"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push || echo "⚠️  git push failed — gh-pages deploy will still run"

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: panchangam-state-${{ github.run_id }}
          path: output/pipeline_state.json
          retention-days: 7

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard

      - name: Summary
        run: |
          echo "## 🕉 Panchangam Data Scraped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Data is live in the dashboard. **Open it, review/edit the panchangam data, then click Generate Videos.**" >> $GITHUB_STEP_SUMMARY


  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 2a: Render videos → deploy thumbnails + state to dashboard (rendered)
  # Runs automatically after scrape on schedule, OR manually via render_approved.
  # ─────────────────────────────────────────────────────────────────────────────
  render-videos:
    name: Render Videos
    runs-on: ubuntu-latest
    needs: [scrape-data]
    if: |
      always() && (
        github.event.inputs.render_approved == 'true' ||
        (github.event_name == 'schedule' && needs.scrape-data.result == 'success')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig
          ffmpeg -version | head -1
          # GitHub Actions Ubuntu runners ship with google-chrome-stable pre-installed.
          # Prefer it over chromium (which is a snap on Ubuntu 22.04 and won't run in CI).
          CHROME_BIN="$(which google-chrome-stable 2>/dev/null \
                     || which google-chrome 2>/dev/null \
                     || which chromium-browser 2>/dev/null \
                     || which chromium 2>/dev/null \
                     || echo '')"
          if [ -n "$CHROME_BIN" ]; then
            echo "REMOTION_BROWSER_EXECUTABLE=$CHROME_BIN" >> $GITHUB_ENV
            echo "Using Chrome: $CHROME_BIN"
          else
            echo "⚠️  No Chrome/Chromium found — Remotion will fall back to Pillow renderer"
          fi

      - name: Download Telugu fonts
        run: |
          mkdir -p /home/runner/fonts/telugu
          BASE="https://raw.githubusercontent.com/notofonts/noto-fonts/refs/heads/main/hinted/ttf/NotoSansTelugu"
          curl -fsSL "${BASE}/NotoSansTelugu-Regular.ttf" -o /home/runner/fonts/telugu/NotoSansTelugu-Regular.ttf
          curl -fsSL "${BASE}/NotoSansTelugu-Bold.ttf"    -o /home/runner/fonts/telugu/NotoSansTelugu-Bold.ttf
          BASE2="https://raw.githubusercontent.com/notofonts/noto-fonts/refs/heads/main/hinted/ttf/NotoSans"
          curl -fsSL "${BASE2}/NotoSans-Regular.ttf" -o /home/runner/fonts/telugu/NotoSans-Regular.ttf
          curl -fsSL "${BASE2}/NotoSans-Bold.ttf"    -o /home/runner/fonts/telugu/NotoSans-Bold.ttf
          pip install pillow -q
          python3 -c "
          from PIL import ImageFont
          bold = ImageFont.truetype('/home/runner/fonts/telugu/NotoSansTelugu-Bold.ttf', 40)
          print('Telugu font OK')
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion/package-lock.json

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml pytz anthropic pillow gtts scipy fonttools \
                      selenium webdriver-manager elevenlabs numpy

      - name: Render videos
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:          ${{ secrets.ELEVENLABS_API_KEY }}
          REMOTION_BROWSER_EXECUTABLE: ${{ env.REMOTION_BROWSER_EXECUTABLE }}
        run: |
          mkdir -p output
          cd scripts && python pipeline.py --render-only

      - name: Verify videos were created
        run: |
          VIDEO_COUNT=$(ls output/video_*.mp4 2>/dev/null | wc -l)
          echo "Videos created: $VIDEO_COUNT"
          if [ "$VIDEO_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No videos were rendered! Check the render step logs above."
            exit 1
          fi
          echo "✅ $VIDEO_COUNT video(s) ready."

      - name: Copy thumbnails + state to dashboard
        run: |
          mkdir -p dashboard/thumbs
          for f in output/thumb_*.jpg; do
            [ -f "$f" ] && cp "$f" dashboard/thumbs/
          done
          cp output/pipeline_state.json dashboard/pipeline_state.json

      - name: Commit rendered state to repo
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/pipeline_state.json dashboard/thumbs/
          git diff --cached --quiet || git commit -m "chore: update dashboard state after render"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push || echo "⚠️  git push failed — gh-pages deploy will still run"

      - name: Upload video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panchangam-video-${{ github.run_id }}
          path: |
            output/*.mp4
            output/*.jpg
            output/*.mp3
            output/pipeline_state.json
          retention-days: 7

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard

      - name: Summary
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "## 🎬 Videos Rendered (auto)" >> $GITHUB_STEP_SUMMARY
            echo "✅ Scheduled run — uploading to YouTube & Instagram automatically." >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🎬 Videos Rendered" >> $GITHUB_STEP_SUMMARY
            echo "✅ Thumbnails are live in the dashboard. **Review them, then click Upload Videos.**" >> $GITHUB_STEP_SUMMARY
          fi


  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 2b: Upload rendered videos → deploy final state to dashboard (uploaded)
  # Runs automatically after render on schedule, OR manually via upload_approved.
  # ─────────────────────────────────────────────────────────────────────────────
  upload-videos:
    name: Upload Videos
    runs-on: ubuntu-latest
    needs: [render-videos]
    if: |
      always() && (
        github.event.inputs.upload_approved == 'true' ||
        (github.event_name == 'schedule' && needs.render-videos.result == 'success')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Read render run ID from state
        id: render-run
        run: |
          RUN_ID=$(python3 -c "
          import json
          try:
              with open('dashboard/pipeline_state.json') as f:
                  print(json.load(f).get('render_run_id', ''))
          except Exception:
              print('')
          ")
          # On scheduled runs render and upload are chained in the same workflow run.
          # Fall back to the current run ID so artifact download always works.
          if [ -z "$RUN_ID" ]; then
            RUN_ID="${{ github.run_id }}"
            echo "render_run_id not in state — using current run: $RUN_ID"
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Render run ID: $RUN_ID"

      - name: Download rendered video artifacts
        if: steps.render-run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: panchangam-video-${{ steps.render-run.outputs.run_id }}
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.render-run.outputs.run_id }}
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          pip install requests pytz anthropic \
                      boto3 google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Upload to platforms
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          INSTAGRAM_ACCOUNT_ID:     ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME:           ${{ secrets.S3_BUCKET_NAME }}
          VIDEO_PUBLIC_URL:         ${{ secrets.VIDEO_PUBLIC_URL }}
        run: |
          mkdir -p output
          cd scripts && python pipeline.py --upload-only

      - name: Copy final state to dashboard
        run: |
          cp output/pipeline_state.json dashboard/pipeline_state.json || true

      - name: Commit final state to repo
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/pipeline_state.json
          git diff --cached --quiet || git commit -m "chore: update dashboard state after upload"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push || echo "⚠️  git push failed — gh-pages deploy will still run"

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard

      - name: Summary
        run: |
          echo "## 🚀 Videos Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All approved videos have been uploaded to YouTube & Instagram." >> $GITHUB_STEP_SUMMARY
