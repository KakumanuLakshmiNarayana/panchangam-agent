name: Daily Panchangam Pipeline

on:
  schedule:
    # 01:00 UTC = 8 PM EST / 9 PM EDT — generates TOMORROW's videos each evening
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      skip_approval:
        description: 'Skip approval and auto-upload (true/false)'
        required: false
        default: 'false'
      upload_approved:
        description: 'Upload already-approved video (true/false)'
        required: false
        default: 'false'
      use_tomorrow:
        description: 'Generate for tomorrow instead of today (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-video:
    name: Generate Daily Panchangam Video
    runs-on: ubuntu-latest
    if: github.event.inputs.upload_approved != 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig chromium-chromedriver

          echo "=== Installed ==="
          ffmpeg -version | head -1

          CHROMIUM_BIN="$(which chromium-browser 2>/dev/null || which chromium 2>/dev/null || echo '')"
          if [ -n "$CHROMIUM_BIN" ]; then
            echo "REMOTION_BROWSER_EXECUTABLE=$CHROMIUM_BIN" >> $GITHUB_ENV
            echo "Using Chromium: $CHROMIUM_BIN"
          else
            echo "System Chromium not found — Remotion will download its own browser"
          fi

      - name: Download NotoSansTelugu fonts
        run: |
          mkdir -p /home/runner/fonts/telugu
          BASE="https://raw.githubusercontent.com/notofonts/noto-fonts/refs/heads/main/hinted/ttf/NotoSansTelugu"
          curl -fsSL "${BASE}/NotoSansTelugu-Regular.ttf" -o /home/runner/fonts/telugu/NotoSansTelugu-Regular.ttf
          curl -fsSL "${BASE}/NotoSansTelugu-Bold.ttf"    -o /home/runner/fonts/telugu/NotoSansTelugu-Bold.ttf
          BASE2="https://raw.githubusercontent.com/notofonts/noto-fonts/refs/heads/main/hinted/ttf/NotoSans"
          curl -fsSL "${BASE2}/NotoSans-Regular.ttf" -o /home/runner/fonts/telugu/NotoSans-Regular.ttf
          curl -fsSL "${BASE2}/NotoSans-Bold.ttf"    -o /home/runner/fonts/telugu/NotoSans-Bold.ttf
          pip install pillow -q
          python3 -c "
          from PIL import ImageFont, Image, ImageDraw
          bold = ImageFont.truetype('/home/runner/fonts/telugu/NotoSansTelugu-Bold.ttf', 40)
          print('Telugu font OK')
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion/package-lock.json

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml pytz anthropic pillow gtts scipy fonttools selenium webdriver-manager elevenlabs \
                      boto3 google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Pipeline
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:          ${{ secrets.ELEVENLABS_API_KEY }}
          APPROVAL_EMAIL_FROM:         ${{ secrets.APPROVAL_EMAIL_FROM }}
          APPROVAL_EMAIL_TO:           ${{ secrets.APPROVAL_EMAIL_TO }}
          SMTP_HOST:                   smtp.gmail.com
          SMTP_PORT:                   587
          SMTP_PASS:                   ${{ secrets.SMTP_PASS }}
          REMOTION_BROWSER_EXECUTABLE: ${{ env.REMOTION_BROWSER_EXECUTABLE }}
          # Upload secrets — only used when skip_approval=true triggers inline upload
          YOUTUBE_CREDENTIALS_JSON:    ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          INSTAGRAM_ACCOUNT_ID:        ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN:      ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID:           ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:       ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME:              ${{ secrets.S3_BUCKET_NAME }}
          VIDEO_PUBLIC_URL:            ${{ secrets.VIDEO_PUBLIC_URL }}
        run: |
          mkdir -p output
          cd scripts
          # Scheduled runs always use --tomorrow; manual dispatch uses the input
          USE_TOMORROW="${{ github.event.inputs.use_tomorrow }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$USE_TOMORROW" = "true" ]; then
            TOMORROW_FLAG="--tomorrow"
          else
            TOMORROW_FLAG=""
          fi

          if [ "${{ github.event.inputs.skip_approval }}" = "true" ]; then
            python pipeline.py --skip-approval $TOMORROW_FLAG
          else
            python pipeline.py $TOMORROW_FLAG
          fi

      - name: Copy thumbnails and state to dashboard
        run: |
          mkdir -p dashboard/thumbs
          # Copy all thumbnails into dashboard/thumbs/
          for f in output/thumb_*.jpg; do
            [ -f "$f" ] && cp "$f" dashboard/thumbs/
          done
          # Copy state JSON
          cp output/pipeline_state.json dashboard/pipeline_state.json || true
          # Write repo config for the dashboard JS
          echo '{
            "owner": "${{ github.repository_owner }}",
            "repo":  "${{ github.event.repository.name }}",
            "run_id": "${{ github.run_id }}",
            "workflow_file": "daily-pipeline.yml"
          }' > dashboard/repo_config.json

      - name: Commit dashboard assets to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/pipeline_state.json dashboard/thumbs/ dashboard/repo_config.json
          git diff --cached --quiet || git commit -m "chore: update dashboard state + thumbnails [skip ci]"
          git push

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: panchangam-video-${{ github.run_id }}
          path: |
            output/*.mp4
            output/*.jpg
            output/*.mp3
            output/pipeline_state.json
          retention-days: 7

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard

      - name: Summary
        run: |
          echo "## 🕉 Panchangam Pipeline Done" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📧 Check your dashboard to approve." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact ID:** \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output Files**" >> $GITHUB_STEP_SUMMARY
          ls output/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || true

  upload-approved:
    name: Upload Approved Video
    runs-on: ubuntu-latest
    if: github.event.inputs.upload_approved == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests boto3 pytz anthropic google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Download latest artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily-pipeline.yml
          name_is_regexp: true
          name: panchangam-video-.*
          path: output/

      - name: Flatten artifact subdirectory
        # dawidd6 extracts into output/<artifact-name>/... — move everything up to output/
        run: |
          find output/ -mindepth 2 -type f -exec mv -t output/ {} + || true
          find output/ -mindepth 1 -type d -empty -delete || true
          echo "=== output/ after flatten ==="
          ls output/

      - name: Upload approved video
        env:
          YOUTUBE_CREDENTIALS_JSON:   ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          INSTAGRAM_ACCOUNT_ID:       ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN:     ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID:          ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:      ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME:             ${{ secrets.S3_BUCKET_NAME }}
          VIDEO_PUBLIC_URL:           ${{ secrets.VIDEO_PUBLIC_URL }}
        run: |
          python3 -c "
          import json
          with open('output/pipeline_state.json') as f: s=json.load(f)
          s['approval_status']='approved'
          with open('output/pipeline_state.json','w') as f: json.dump(s,f)
          print('Marked approved')
          "
          cd scripts && python pipeline.py --upload-approved
