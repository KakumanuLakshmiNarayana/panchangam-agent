name: Daily Panchangam Pipeline

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      skip_approval:
        description: 'Skip approval and auto-upload (true/false)'
        required: false
        default: 'false'
      upload_approved:
        description: 'Upload already-approved video (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-video:
    name: Generate Daily Panchangam Video
    runs-on: ubuntu-latest
    if: github.event.inputs.upload_approved != 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-noto fonts-noto-extra fonts-freefont-ttf fontconfig \
            chromium-browser chromium-chromedriver

          # Download NotoSansTelugu directly (guaranteed Telugu support)
          sudo mkdir -p /usr/local/share/fonts/telugu
          sudo wget -q -O /usr/local/share/fonts/telugu/NotoSansTelugu-Regular.ttf \
            "https://github.com/googlefonts/noto-fonts/raw/main/phased/NotoSansTelugu/NotoSansTelugu-Regular.ttf"
          sudo wget -q -O /usr/local/share/fonts/telugu/NotoSansTelugu-Bold.ttf \
            "https://github.com/googlefonts/noto-fonts/raw/main/phased/NotoSansTelugu/NotoSansTelugu-Bold.ttf"
          sudo fc-cache -fv
          echo "Telugu fonts installed:"
          fc-list | grep -i telugu || echo "  (checking system paths directly)"
          ls /usr/local/share/fonts/telugu/

          echo "FFmpeg: $(ffmpeg -version | head -1)"
          echo "Chrome: $(chromium-browser --version)"

      - name: Install Python dependencies
        run: |
          pip install \
            requests \
            beautifulsoup4 \
            lxml \
            pytz \
            anthropic \
            pillow \
            gtts \
            scipy \
            fonttools \
            selenium \
            webdriver-manager

      - name: Run Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          APPROVAL_EMAIL_FROM: ${{ secrets.APPROVAL_EMAIL_FROM }}
          APPROVAL_EMAIL_TO:   ${{ secrets.APPROVAL_EMAIL_TO }}
          SMTP_HOST:           smtp.gmail.com
          SMTP_PORT:           587
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
        run: |
          mkdir -p output
          cd scripts
          if [ "${{ github.event.inputs.skip_approval }}" = "true" ]; then
            python pipeline.py --skip-approval
          else
            python pipeline.py
          fi

      - name: Debug - list output files
        if: always()
        run: |
          echo "=== Output files ==="
          ls -lh output/ || echo "No output dir"
          echo "=== Font test ==="
          python3 -c "
          from PIL import ImageFont
          import os, glob
          paths = glob.glob('/usr/local/share/fonts/telugu/*.ttf') + \
                  glob.glob('/usr/share/fonts/**/*Telugu*', recursive=True)
          print('Telugu fonts found:', paths[:5])
          if paths:
              f = ImageFont.truetype(paths[0], 40)
              print('Font loaded OK:', paths[0])
          "

      - name: Copy state to dashboard
        run: cp output/pipeline_state.json dashboard/pipeline_state.json || true

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: panchangam-video-${{ github.run_id }}
          path: |
            output/*.mp4
            output/*.jpg
            output/*.mp3
            output/pipeline_state.json
          retention-days: 7

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard

      - name: Summary
        run: |
          echo "## 🕉 Panchangam Pipeline Done" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📧 Check your email to approve." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output Files**" >> $GITHUB_STEP_SUMMARY
          ls output/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

  upload-approved:
    name: Upload Approved Video
    runs-on: ubuntu-latest
    if: github.event.inputs.upload_approved == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests boto3 pytz anthropic

      - name: Download latest artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily-pipeline.yml
          name_is_regexp: true
          name: panchangam-video-.*
          path: output/

      - name: Upload approved video
        env:
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME:         ${{ secrets.S3_BUCKET_NAME }}
        run: |
          python3 -c "
          import json
          with open('output/pipeline_state.json') as f: s=json.load(f)
          s['approval_status']='approved'
          with open('output/pipeline_state.json','w') as f: json.dump(s,f)
          print('Marked approved')
          "
          cd scripts && python pipeline.py --upload-approved
